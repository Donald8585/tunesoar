name: Release Tunesoar

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''
          - platform: windows-latest
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            patchelf libssl-dev build-essential \
            libgtk-3-dev libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        if: matrix.target != ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target == ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          IS_DRAFT="${{ github.event_name == 'workflow_dispatch' }}"
          echo "TAG=$TAG draft=$IS_DRAFT"

          # Create release if it doesn't exist
          if ! gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Tunesoar $TAG" \
              --notes "Context-aware binaural beats for your desktop." \
              --draft="$IS_DRAFT"
          fi

          # Upload all built bundle files
          echo "Uploading assets..."
          if [ -n "${{ matrix.target }}" ]; then
            BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          else
            BUNDLE_DIR="src-tauri/target/release/bundle"
          fi
          echo "Bundle dir: $BUNDLE_DIR"
          find "$BUNDLE_DIR" -type f \
            \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' \
               -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \
               -o -name '*.tar.gz' -o -name '*.sig' -o -name 'latest.json' \) \
            -exec gh release upload "$TAG" --repo "${{ github.repository }}" {} --clobber \;

          echo "Upload complete for ${{ matrix.target }}"

  r2-upload:
    needs: build-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload release assets to R2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: tunesoar-releases
        run: |
          set -euo pipefail
          VERSION=$(grep -Po '"version":\s*"\K[^"]+' src-tauri/tauri.conf.json | head -1)
          TAG="v$VERSION"
          echo "Version: $VERSION  Tag: $TAG"

          ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[] | "\(.name)|\(.url)"')

          for line in $ASSETS; do
            NAME="${line%%|*}"
            URL="${line##*|}"
            echo "Uploading: $NAME"

            curl -sfL -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Accept: application/octet-stream" \
                 "$URL" | \
            curl -sf -X PUT \
                 "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/r2/buckets/$R2_BUCKET/objects/$NAME" \
                 -H "Authorization: Bearer $CF_API_TOKEN" \
                 --data-binary @-
            echo "  OK $NAME"
          done

          echo "All done"
