name: Build & Release — All Platforms

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create draft release"
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: "9"

jobs:
  # ── Windows x64 ──────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build (NSIS + MSI)
        run: pnpm tauri build --bundles nsis,msi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: tunesoar-windows-x64-nsis
          path: src-tauri/target/release/bundle/nsis/TuneSoar_*.exe

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: tunesoar-windows-x64-msi
          path: src-tauri/target/release/bundle/msi/TuneSoar_*.msi

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tunesoar-windows-x64-updater
          path: |
            src-tauri/target/release/bundle/nsis/TuneSoar_*.exe.zip
            src-tauri/target/release/bundle/nsis/TuneSoar_*.exe.zip.sig

  # ── macOS Universal (x64 + arm64) ────────────────────────────
  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build (DMG universal)
        run: pnpm tauri build --bundles dmg --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: tunesoar-macos-universal
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/TuneSoar_*.dmg

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tunesoar-macos-updater
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/TuneSoar.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/TuneSoar.app.tar.gz.sig

  # ── Linux (x64 + arm64) ─────────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'aarch64' && 'aarch64-unknown-linux-gnu' || '' }}

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential pkg-config libssl-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libasound2-dev

      - name: Install aarch64 cross-compile deps
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt install -y gcc-aarch64-linux-gnu
          sudo dpkg --add-architecture arm64
          sudo apt update
          sudo apt install -y \
            libgtk-3-dev:arm64 libwebkit2gtk-4.1-dev:arm64 \
            libjavascriptcoregtk-4.1-dev:arm64 libsoup-3.0-dev:arm64 \
            libssl-dev:arm64 libasound2-dev:arm64

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build (deb + AppImage)
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            export PKG_CONFIG_PATH="/usr/lib/aarch64-linux-gnu/pkgconfig"
            pnpm tauri build --bundles deb,appimage --target aarch64-unknown-linux-gnu
          else
            pnpm tauri build --bundles deb,appimage
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: tunesoar-linux-${{ matrix.arch }}-deb
          path: src-tauri/target/*/release/bundle/deb/tunesoar_*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: tunesoar-linux-${{ matrix.arch }}-appimage
          path: src-tauri/target/*/release/bundle/appimage/tunesoar_*.AppImage

  # ── Create GitHub Release ────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifact dirs
        run: |
          mkdir -p release
          find release-artifacts -type f | while read f; do
            cp "$f" "release/$(basename "$f")"
          done
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
