name: Release Tunesoar

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Step 1: Create the GitHub Release first ──────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=v$(grep -Po '"version":\s*"\K[^"]+' src-tauri/tauri.conf.json | head -1)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Tunesoar ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Tunesoar ${{ steps.version.outputs.VERSION }}

            Context-aware binaural beats for your desktop.

            ### Downloads
            - **Windows:** `Tunesoar_*_x64-setup.exe` (.msi also available)
            - **macOS Apple Silicon (M1/M2/M3):** `Tunesoar_*_aarch64.dmg` (unsigned — right-click → Open)
            - **macOS Intel:** `Tunesoar_*_x64.dmg` (unsigned — right-click → Open)
            - **Linux:** `tunesoar_*_amd64.deb` or `tunesoar_*_amd64.AppImage`

            > ⚠️ macOS builds are ad-hoc signed. Right-click → Open on first launch.

            See [CHANGELOG.md](./CHANGELOG.md) for full details.
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: false
          files: |

  # ── Step 2: Build all platforms and upload to the release ────
  build-upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            patchelf libssl-dev build-essential \
            libgtk-3-dev libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          releaseId: ${{ github.event_name == 'workflow_dispatch' && '' || '' }}
          updaterJsonPreferNsis: true

  # ── Step 3: Sync all release assets to R2 CDN ───────────────
  r2-upload:
    needs: build-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload release assets to R2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: tunesoar-releases
        run: |
          set -euo pipefail
          VERSION=$(grep -Po '"version":\s*"\K[^"]+' src-tauri/tauri.conf.json | head -1)
          TAG="v$VERSION"
          echo "Version: $VERSION  Tag: $TAG"

          ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[] | "\(.name)|\(.url)"')

          for line in $ASSETS; do
            NAME="${line%%|*}"
            URL="${line##*|}"
            echo "Uploading: $NAME"

            curl -sfL -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Accept: application/octet-stream" \
                 "$URL" | \
            curl -sf -X PUT \
                 "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/r2/buckets/$R2_BUCKET/objects/$NAME" \
                 -H "Authorization: Bearer $CF_API_TOKEN" \
                 --data-binary @-
            echo "  ✓ $NAME"
          done

          echo ""
          echo "All assets synced to R2 ✅"
