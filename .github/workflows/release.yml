name: Release Tunesoar

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            patchelf libssl-dev build-essential \
            libgtk-3-dev libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev \
            libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"

          # Create release if it doesn't exist (first job wins, rest skip)
          if ! gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Tunesoar $TAG" \
              --notes "Context-aware binaural beats for your desktop." \
              --draft="${{ github.event_name == 'workflow_dispatch' }}"
          fi

          # Upload all built bundle files that tauri-action produced
          find src-tauri/target -type f \
            \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' \
               -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \
               -o -name '*.tar.gz' -o -name '*.sig' -o -name 'latest.json' \) \
            -not -path '*/deps/*' -not -path '*/.fingerprint/*' -not -path '*/build/*' \
            -exec gh release upload "$TAG" --repo "${{ github.repository }}" {} --clobber \;

          echo "Upload done for ${{ matrix.platform }}"

  r2-upload:
    needs: build-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload release assets to R2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: tunesoar-releases
        run: |
          set -euo pipefail
          VERSION=$(grep -Po '"version":\s*"\K[^"]+' src-tauri/tauri.conf.json | head -1)
          TAG="v$VERSION"

          ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[] | "\(.name)|\(.url)"')

          for line in $ASSETS; do
            NAME="${line%%|*}"
            URL="${line##*|}"
            echo "Uploading: $NAME"
            curl -sfL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/octet-stream" "$URL" | \
            curl -sf -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/r2/buckets/$R2_BUCKET/objects/$NAME" \
              -H "Authorization: Bearer $CF_API_TOKEN" --data-binary @-
            echo "  OK $NAME"
          done
          echo "All synced to R2"
