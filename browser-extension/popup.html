<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TuneSoar Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e4e6f0;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg, #5c7cfa, #364fc7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    h2 { font-size: 14px; font-weight: 600; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status.connected { background: #364fc7/20; border: 1px solid #364fc7/40; }
    .status.disconnected { background: #ff6b6b/10; border: 1px solid #ff6b6b/30; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transition: background 0.3s;
    }
    .dot.connected { background: #5c7cfa; }
    .dot.disconnected { background: #ff6b6b; }
    .section {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #8b8fa6;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #242836;
      background: #1a1d27;
      color: #e4e6f0;
      font-size: 12px;
      font-family: monospace;
    }
    input:focus { outline: none; border-color: #5c7cfa; }
    button {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #5c7cfa;
      color: white;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4c6ef5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .info {
      font-size: 11px;
      color: #8b8fa6;
      line-height: 1.5;
    }
    .success {
      color: #5c7cfa;
      font-size: 11px;
      margin-top: 8px;
      display: none;
    }
    .success.show { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎵</div>
    <h2>TuneSoar Bridge</h2>
  </div>

  <div id="status" class="status disconnected">
    <div id="dot" class="dot disconnected"></div>
    <span id="statusText">Not connected to desktop app</span>
  </div>

  <div class="section">
    <label for="token">Auth Token</label>
    <input type="text" id="token" placeholder="Paste token from TuneSoar settings..." />
  </div>

  <button id="saveBtn">Save & Connect</button>
  <button id="reconnectBtn" style="margin-top: 6px; background: #242836;">Reconnect</button>
  <div id="success" class="success">✓ Token saved</div>

  <p class="info" style="margin-top: 12px;">
    The TuneSoar desktop app must be running for this extension to work.
    Copy the token from TuneSoar Settings → Browser Extension.
  </p>

  <script src="popup.js"></script>
</body>
</html>
